<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Drydock social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1714"/>
      <stop offset="1" stop-color="#080d0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#2e8555" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#2e8555" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#2e8555" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3cad6e"/>
      <stop offset="1" stop-color="#1f7a48"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#2e8555"/>

  <!-- brand mark (tile + ship) -->
  <g transform="translate(90,86) scale(1.5)">
    <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#tile)"/>
    <rect x="30.6" y="12" width="2.8" height="16" rx="1.4" fill="#ffffff"/>
    <path d="M33.4 13.2 L41 16.4 L33.4 19.6 Z" fill="#ffffff"/>
    <path d="M14 26 H50 L44.5 40 Q32 46.5 19.5 40 Z" fill="#ffffff"/>
    <g fill="#ffffff" opacity="0.9">
      <rect x="14" y="46.5" width="12" height="3" rx="1.5"/>
      <rect x="29" y="46.5" width="6" height="3" rx="1.5"/>
      <rect x="38" y="46.5" width="12" height="3" rx="1.5"/>
    </g>
  </g>

  <text x="218" y="170" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="bold" fill="#f1f6f3" letter-spacing="-2">Drydock</text>

  <text x="92" y="290" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="600" fill="#d6e6dd">An idea-to-launch product team for Claude Code.</text>

  <text x="92" y="358" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#9fb6a8">19 specialized agents · receipts &amp; gates · security by default · open source</text>

  <!-- pipeline -->
  <text x="92" y="452" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="bold" fill="#5fd08e" letter-spacing="1">DEFINE → BUILD → HARDEN → SHIP → LAUNCH → SUSTAIN</text>

  <rect x="92" y="520" width="1016" height="1.5" fill="#1d2a24"/>

  <text x="92" y="572" font-family="Menlo, Consolas, monospace" font-size="28" fill="#cfe3d8">drydock.sundarshahithakuri.com.np</text>
  <text x="1108" y="572" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#7e958a">Claude Code plugin · v2.5.0</text>
</svg>
